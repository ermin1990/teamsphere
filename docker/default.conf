server {
    listen 80;
    server_name _;
    root /var/www/public;
    index index.php index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Handle static files
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Handle PHP files
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Environment variables for PHP
        fastcgi_param APP_ENV production;
        fastcgi_param APP_KEY $APP_KEY;
        fastcgi_param DB_CONNECTION $DB_CONNECTION;
        fastcgi_param DB_HOST $DB_HOST;
        fastcgi_param DB_PORT $DB_PORT;
        fastcgi_param DB_DATABASE $DB_DATABASE;
        fastcgi_param DB_USERNAME $DB_USERNAME;
        fastcgi_param DB_PASSWORD $DB_PASSWORD;
    }

    # Handle Laravel routes
    location / {
        try_files $uri $uri/ /index.php?$query_string;

        # Cache static assets
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Deny access to sensitive files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ \.(env|git) {
        deny all;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}