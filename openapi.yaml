      tags: [Competitions]
      summary: Brisanje takmičenja
      parameters: [{ $ref: "#/components/parameters/CompetitionSlug" }]
      responses:
        "200": { description: OK }

  /competitions/{competition}/start:
    post:
      tags: [Competitions]
      summary: Pokretanje takmičenja (generiše grupe/raspored)
      parameters: [{ $ref: "#/components/parameters/CompetitionSlug" }]
      responses:
        "200": { description: OK }
        "400": { description: "Takmičenje nije u statusu 'draft'" }

  /competitions/{competition}/complete:
    post:
      tags: [Competitions]
      summary: Završavanje takmičenja
      parameters: [{ $ref: "#/components/parameters/CompetitionSlug" }]
      responses:
        "200": { description: OK }

  /competitions/{competition}/reset:
    post:
      tags: [Competitions]
      summary: Resetovanje takmičenja u status 'draft' (briše mečeve/grupe)
      parameters: [{ $ref: "#/components/parameters/CompetitionSlug" }]
      responses:
        "200": { description: OK }

  /competitions/{competition}/join-requests:
    get:
      tags: [CompetitionJoinRequests]
      summary: Lista zahtjeva za pristup (organizator)
      parameters: [{ $ref: "#/components/parameters/CompetitionSlug" }]
      responses:
        "200": { description: OK }
    post:
      tags: [CompetitionJoinRequests]
      summary: Slanje zahtjeva za pristup takmičenju (self-serve, bilo koji prijavljeni korisnik)
      parameters: [{ $ref: "#/components/parameters/CompetitionSlug" }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message: { type: string }
      responses:
        "201": { description: Created }
        "422": { description: "Takmičenje nije otvoreno za prijave / već postoji zahtjev" }

  /competitions/{competition}/join-requests/{joinRequest}:
    put:
      tags: [CompetitionJoinRequests]
      summary: Prihvatanje/odbijanje zahtjeva (organizator)
      parameters:
        - { $ref: "#/components/parameters/CompetitionSlug" }
        - { $ref: "#/components/parameters/Id" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [approved, rejected] }
      responses:
        "200": { description: OK }

  /competitions/{competition}/groups:
    get:
      tags: [TournamentGroups]
      summary: Lista grupa turnira (read-only, generišu se prilikom pokretanja)
      parameters: [{ $ref: "#/components/parameters/CompetitionSlug" }]
      responses:
        "200": { description: OK }

  /competitions/{competition}/groups/{group}:
    get:
      tags: [TournamentGroups]
      summary: Detalji grupe (uz tabelu)
      parameters:
        - { $ref: "#/components/parameters/CompetitionSlug" }
        - { $ref: "#/components/parameters/Id" }
      responses:
        "200": { description: OK }

  /competitions/{competition}/matches:
    get:
      tags: [CompetitionMatches]
      summary: Mečevi takmičenja (grupna + knockout faza)
      parameters:
        - { $ref: "#/components/parameters/CompetitionSlug" }
        - name: phase
          in: query
          schema: { type: string, enum: [group, round_of_16, quarter_final, semi_final, final, third_place] }
      responses:
        "200": { description: OK }

  /competitions/{competition}/matches/{match}:
    get:
      tags: [CompetitionMatches]
      summary: Detalji meča
      parameters:
        - { $ref: "#/components/parameters/CompetitionSlug" }
        - { $ref: "#/components/parameters/Id" }
      responses:
        "200": { description: OK }
    put:
      tags: [CompetitionMatches]
      summary: Unos rezultata - rekalkulira grupnu tabelu / provlači pobjednika u knockout
      parameters:
        - { $ref: "#/components/parameters/CompetitionSlug" }
        - { $ref: "#/components/parameters/Id" }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                home_score: { type: integer }
                away_score: { type: integer }
                status: { type: string, enum: [scheduled, in_progress, completed, forfeited] }
                sets: { type: array, items: {} }
                played_at: { type: string, format: date-time }
      responses:
        "200": { description: OK }

  /competitions/{competition}/team-matches:
    get:
      tags: [TeamMatches]
      summary: Timski mečevi takmičenja (BiH pravilo - prvi do 4 pobjede)
      parameters: [{ $ref: "#/components/parameters/CompetitionSlug" }]
      responses:
        "200": { description: OK }

  /competitions/{competition}/team-matches/{teamMatch}:
    get:
      tags: [TeamMatches]
      summary: Detalji timskog meča
      parameters:
        - { $ref: "#/components/parameters/CompetitionSlug" }
        - { $ref: "#/components/parameters/Id" }
      responses:
        "200": { description: OK }
    put:
      tags: [TeamMatches]
      summary: Unos rezultata pojedinačnog susreta - automatski provjerava kompletnost timskog meča
      parameters:
        - { $ref: "#/components/parameters/CompetitionSlug" }
        - { $ref: "#/components/parameters/Id" }
      responses:
        "200": { description: OK }

  /competitions/{competition}/standings:
    get:
      tags: [Standings]
      summary: Tabela takmičenja (read-only, sortirana po poziciji)
      parameters: [{ $ref: "#/components/parameters/CompetitionSlug" }]
      responses:
        "200": { description: OK }
