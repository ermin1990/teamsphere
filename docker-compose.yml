version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: teamsphere_backend
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html:cached
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=
    ports:
      - "8000:8000"
    depends_on: []

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: teamsphere_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

# Optional: add database or other services here (mysql, redis, etc.)
