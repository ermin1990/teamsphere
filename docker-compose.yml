services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: teamsphere-app:latest
    container_name: teamsphere_app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - teamsphere_net

  nginx:
    image: nginx:alpine
    container_name: teamsphere_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - storage_data:/var/www/html/storage:ro
    depends_on:
      - app
    networks:
      - teamsphere_net

  postgres:
    image: postgres:16-alpine
    container_name: teamsphere_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - teamsphere_net

  queue:
    image: teamsphere-app:latest
    container_name: teamsphere_queue
    restart: unless-stopped
    env_file:
      - .env
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - teamsphere_net

networks:
  teamsphere_net:
    driver: bridge

volumes:
  postgres_data:
  storage_data:
