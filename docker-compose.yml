services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: teamsphere-app:latest
    container_name: teamsphere_app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - storage_data:/var/www/html/storage
      # public_assets_v2 NIJE isti mount point kao app-ov stvarni /var/www/html/public (koji
      # dolazi iz image-a, svjež na svakom build-u). entrypoint.sh kopira built assets u
      # ovaj dijeljeni volumen pri svakom startu, tako da nginx uvijek vidi najnovije
      # CSS/JS fajlove umjesto zaglavljenih iz prvog deploy-a (named volume se inace
      # popuni iz image-a SAMO jednom, pri kreiranju - direktan mount bi zamrznuo assets).
      - public_assets_v2:/var/www/html/public_export
    depends_on:
      db:
        condition: service_healthy
    networks:
      - teamsphere_net

  nginx:
    image: nginx:alpine
    container_name: teamsphere_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
      - storage_data:/var/www/html/storage:ro
      - public_assets_v2:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - teamsphere_net

  db:
    image: mysql:8.0
    container_name: teamsphere_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      # Uvozi infinit4_testteamsphere.sql AUTOMATSKI, ali samo jednom: MySQL image-ov
      # docker-entrypoint-initdb.d mehanizam pokreće ove skripte (alfabetskim redom) samo
      # kad je /var/lib/mysql prazan (prvi start na svježem volumenu) - ne diraju se
      # postojeći podaci ni na jednom narednom redeploy-u/restart-u.
      - ./infinit4_testteamsphere.sql:/docker-entrypoint-initdb.d/01-import.sql:ro
      - ./docker/mysql-init/02-fix-migrations-bookkeeping.sql:/docker-entrypoint-initdb.d/02-fix-migrations-bookkeeping.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - teamsphere_net

  queue:
    image: teamsphere-app:latest
    container_name: teamsphere_queue
    restart: unless-stopped
    env_file:
      - .env
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - teamsphere_net

networks:
  teamsphere_net:
    driver: bridge

volumes:
  mysql_data:
  storage_data:
  public_assets_v2:
