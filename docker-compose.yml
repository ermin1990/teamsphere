version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=teamsphere
      - DB_USERNAME=root
      - DB_PASSWORD=password
      - CACHE_DRIVER=file
      - QUEUE_CONNECTION=sync
      - SESSION_DRIVER=file
    depends_on:
      - mysql
    volumes:
      - ./storage:/var/www/storage
    networks:
      - teamsphere

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=teamsphere
      - MYSQL_USER=teamsphere
      - MYSQL_PASSWORD=password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - teamsphere

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - teamsphere

volumes:
  mysql_data:

networks:
  teamsphere:
    driver: bridge