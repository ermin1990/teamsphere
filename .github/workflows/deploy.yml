name: 🚀 Deploy to VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      - name: Create deploy bundle
        run: |
          rm -rf /tmp/teamsphere_bundle
          mkdir -p /tmp/teamsphere_bundle

          rsync -a --delete \
            --exclude=.git \
            --exclude=.env \
            --exclude=node_modules \
            --exclude=vendor \
            --exclude=.github \
            --exclude=deploy.tar.gz \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/data/*' \
            --exclude='database/*.sqlite' \
            ./ /tmp/teamsphere_bundle/

          tar -C /tmp/teamsphere_bundle -czf deploy.tar.gz .

      - name: Copy bundle to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "deploy.tar.gz"
          target: "/tmp/teamsphere_deploy"
          rm: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            TMP_DIR="/tmp/teamsphere_deploy"
            BUNDLE="$TMP_DIR/deploy.tar.gz"

            if [ -z "$APP_DIR" ]; then
              echo "ERROR: VPS_APP_DIR secret is empty."
              exit 1
            fi

            if [ ! -f "$BUNDLE" ]; then
              echo "ERROR: Bundle not found on VPS: $BUNDLE"
              exit 1
            fi

            mkdir -p "$APP_DIR"
            tar -xzf "$BUNDLE" -C "$APP_DIR"

            if [ ! -f "$APP_DIR/.env" ]; then
              echo "INFO: .env not found. Creating from .env.example..."
              cp "$APP_DIR/.env.example" "$APP_DIR/.env"
            fi

            cd "$APP_DIR"

            # 1. POPRAVKA: Kreiramo storage strukturu ODMAH, prije Composera
            echo "📁 Pripremam storage i cache foldere..."
            mkdir -p storage/app/public
            mkdir -p storage/framework/cache/data
            mkdir -p storage/framework/sessions
            mkdir -p storage/framework/views
            mkdir -p bootstrap/cache

            # Privremeno dajemo dozvole da Composer ne pukne
            if command -v sudo >/dev/null 2>&1; then
              sudo chown -R www-data:www-data storage bootstrap/cache || true
              sudo chmod -R ug+rwX storage bootstrap/cache || true
            fi

            # 2. Instalacija PHP paketa direktno na serveru
            echo "📦 Instaliram Composer pakete..."
            composer install --no-dev --optimize-autoloader --no-interaction

            # 3. Ensure MySQL is available, create DB/user and run migrations
            echo "🗄️ Provjeravam MySQL i kreiram bazu/korisnika ako treba..."

            DB_NAME="${{ secrets.VPS_DB_NAME }}"
            DB_USER="${{ secrets.VPS_DB_USERNAME }}"
            DB_PASS="${{ secrets.VPS_DB_PASSWORD }}"
            DB_HOST="${{ secrets.VPS_DB_HOST }}"
            DB_PORT="${{ secrets.VPS_DB_PORT }}"

            DB_NAME="${DB_NAME:-teamsphere}"
            DB_USER="${DB_USER:-teamsphere}"
            DB_PASS="${DB_PASS:-secret}"
            DB_HOST="${DB_HOST:-127.0.0.1}"
            DB_PORT="${DB_PORT:-3306}"

            if ! command -v mysql >/dev/null 2>&1; then
              echo "INFO: mysql client not found, attempting to install MySQL server/client..."
              if command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update -y || true
                sudo DEBIAN_FRONTEND=noninteractive apt-get install -y default-mysql-server || sudo apt-get install -y mysql-server || true
                sudo systemctl enable --now mysql || sudo systemctl enable --now mariadb || true
              elif command -v yum >/dev/null 2>&1; then
                sudo yum install -y mariadb-server || true
                sudo systemctl enable --now mariadb || true
              else
                echo "WARNING: Could not install MySQL automatically on this host. Ensure MySQL is available."
              fi
            fi

            if command -v mysql >/dev/null 2>&1; then
              echo "INFO: Creating MySQL database and user if missing..."
              if command -v sudo >/dev/null 2>&1; then
                sudo mysql -e "CREATE DATABASE IF NOT EXISTS \\`$DB_NAME\\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
                sudo mysql -e "CREATE USER IF NOT EXISTS '$DB_USER'@'%' IDENTIFIED BY '$DB_PASS';"
                sudo mysql -e "GRANT ALL PRIVILEGES ON \\`$DB_NAME\\`.* TO '$DB_USER'@'%';"
                sudo mysql -e "FLUSH PRIVILEGES;"
              else
                mysql -e "CREATE DATABASE IF NOT EXISTS \\`$DB_NAME\\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
                mysql -e "CREATE USER IF NOT EXISTS '$DB_USER'@'%' IDENTIFIED BY '$DB_PASS';"
                mysql -e "GRANT ALL PRIVILEGES ON \\`$DB_NAME\\`.* TO '$DB_USER'@'%';"
                mysql -e "FLUSH PRIVILEGES;"
              fi

              # Update .env database settings
              if [ -f .env ]; then
                sed -i "s/^DB_CONNECTION=.*/DB_CONNECTION=mysql/" .env || echo "DB_CONNECTION=mysql" >> .env
                sed -i "s/^DB_HOST=.*/DB_HOST=$DB_HOST/" .env || echo "DB_HOST=$DB_HOST" >> .env
                sed -i "s/^DB_PORT=.*/DB_PORT=$DB_PORT/" .env || echo "DB_PORT=$DB_PORT" >> .env
                sed -i "s/^DB_DATABASE=.*/DB_DATABASE=$DB_NAME/" .env || echo "DB_DATABASE=$DB_NAME" >> .env
                sed -i "s/^DB_USERNAME=.*/DB_USERNAME=$DB_USER/" .env || echo "DB_USERNAME=$DB_USER" >> .env
                sed -i "s/^DB_PASSWORD=.*/DB_PASSWORD=$DB_PASS/" .env || echo "DB_PASSWORD=$DB_PASS" >> .env
              fi

              echo "INFO: Running Laravel migrations..."
              php artisan config:clear || true
              php artisan migrate --force || true
            else
              echo "WARNING: mysql client not available; skipping DB creation and migrations."
            fi

            # 4. Čišćenje i optimizacija Laravel keša
            echo "⚡ Čišćenje i optimizacija Laravel keša..."
            php artisan config:clear || true
            php artisan cache:clear || true
            php artisan route:clear || true
            php artisan view:clear || true

            # 5. Finalno osiguravanje permisija za web server
            echo "🔒 Finalno zaključavanje permisija..."
            if command -v sudo >/dev/null 2>&1; then
              sudo chown -R www-data:www-data "$APP_DIR/storage" "$APP_DIR/bootstrap/cache" || true
              sudo chmod -R ug+rwX "$APP_DIR/storage" "$APP_DIR/bootstrap/cache" || true
              if command -v getenforce >/dev/null 2>&1 && [ "$(getenforce 2>/dev/null)" = "Enforcing" ] && command -v chcon >/dev/null 2>&1; then
                sudo chcon -R -t httpd_sys_rw_content_t "$APP_DIR/storage" "$APP_DIR/bootstrap/cache" || true
              fi
            fi

            if command -v sudo >/dev/null 2>&1; then
              sudo -u www-data test -w "$APP_DIR/storage/framework/views" || true
            else
              test -w "$APP_DIR/storage/framework/views" || true
            fi

            echo "✅ Sve je uspješno podignuto!"