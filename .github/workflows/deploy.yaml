name: 🚀 Deploy to VPS (Docker)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create deploy bundle
        run: |
          rm -rf /tmp/teamsphere_bundle
          mkdir -p /tmp/teamsphere_bundle

          rsync -a --delete \
            --exclude=.git \
            --exclude=.env \
            --exclude=node_modules \
            --exclude=vendor \
            --exclude=.github \
            --exclude=deploy.tar.gz \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/data/*' \
            --exclude='database/*.sqlite' \
            ./ /tmp/teamsphere_bundle/

          tar -C /tmp/teamsphere_bundle -czf deploy.tar.gz .

      - name: Copy bundle to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "deploy.tar.gz"
          target: "/tmp/teamsphere_deploy"
          rm: true

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          APP_KEY: ${{ secrets.APP_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          command_timeout: 30m
          envs: DB_DATABASE,DB_USERNAME,DB_PASSWORD,APP_KEY,APP_URL,MAIL_USERNAME,MAIL_PASSWORD
          script: |
            set -e

            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            TMP_DIR="/tmp/teamsphere_deploy"
            BUNDLE="$TMP_DIR/deploy.tar.gz"

            if [ -z "$APP_DIR" ]; then
              echo "ERROR: VPS_APP_DIR secret is empty."
              exit 1
            fi

            if [ ! -f "$BUNDLE" ]; then
              echo "ERROR: Bundle not found on VPS: $BUNDLE"
              exit 1
            fi

            mkdir -p "$APP_DIR"
            tar -xzf "$BUNDLE" -C "$APP_DIR"

            cd "$APP_DIR"

            # .env se ne šalje u bundle-u (excluded) - generišemo/zadržavamo ga
            # direktno na VPS-u, van Gita, kako tajne nikad ne prolaze kroz repo.
            if [ ! -f ".env" ]; then
              echo "INFO: .env not found. Creating from .env.example..."
              cp .env.example .env
            fi

            # MySQL kredencijali iz GitHub Secrets. Ovo se izvršava pri SVAKOM deploy-u i
            # uvijek povezuje na ISTU, postojeću MySQL bazu (docker-compose named volume
            # `mysql_data` nije diran ovim - ne kreira novu bazu, ne briše postojeće podatke).
            echo "🔧 Upisujem produkcijske vrijednosti u .env..."
            sed -i "s|^DB_CONNECTION=.*|DB_CONNECTION=mysql|" .env || echo "DB_CONNECTION=mysql" >> .env
            sed -i "s|^DB_HOST=.*|DB_HOST=db|" .env || echo "DB_HOST=db" >> .env
            sed -i "s|^DB_PORT=.*|DB_PORT=3306|" .env || echo "DB_PORT=3306" >> .env
            sed -i "s|^DB_DATABASE=.*|DB_DATABASE=$DB_DATABASE|" .env || echo "DB_DATABASE=$DB_DATABASE" >> .env
            sed -i "s|^DB_USERNAME=.*|DB_USERNAME=$DB_USERNAME|" .env || echo "DB_USERNAME=$DB_USERNAME" >> .env
            sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=$DB_PASSWORD|" .env || echo "DB_PASSWORD=$DB_PASSWORD" >> .env

            if [ -n "$APP_KEY" ]; then
              sed -i "s|^APP_KEY=.*|APP_KEY=$APP_KEY|" .env || echo "APP_KEY=$APP_KEY" >> .env
            fi

            sed -i "s|^APP_ENV=.*|APP_ENV=production|" .env

            APP_NAME_VAL="MojTurnir - Organizacija sportskih turnira i liga"
            if grep -q "^APP_NAME=" .env; then
              sed -i "s|^APP_NAME=.*|APP_NAME=\"$APP_NAME_VAL\"|" .env
            else
              echo "APP_NAME=\"$APP_NAME_VAL\"" >> .env
            fi

            if [ -n "$APP_URL" ]; then
              sed -i "s|^APP_URL=.*|APP_URL=$APP_URL|" .env
            fi

            # Realni SMTP kredencijali (Gmail) - .env.example ima namjerno
            # MAIL_MAILER=log (bezbjedan default za novu instalaciju), pa ovo
            # inače nikad ne bi stiglo na VPS jer se .env tamo generiše samo
            # jednom i inače se ne dira. Bez ovoga se svi mailovi (verifikacija,
            # prijave na takmičenja, reset lozinke...) samo loguju, nikad ne šalju.
            echo "📧 Upisujem SMTP kredencijale u .env..."
            sed -i "s|^MAIL_MAILER=.*|MAIL_MAILER=smtp|" .env || true
            grep -q "^MAIL_MAILER=" .env || echo "MAIL_MAILER=smtp" >> .env
            sed -i "s|^MAIL_HOST=.*|MAIL_HOST=smtp.gmail.com|" .env || true
            grep -q "^MAIL_HOST=" .env || echo "MAIL_HOST=smtp.gmail.com" >> .env
            sed -i "s|^MAIL_PORT=.*|MAIL_PORT=587|" .env || true
            grep -q "^MAIL_PORT=" .env || echo "MAIL_PORT=587" >> .env
            sed -i "s|^MAIL_ENCRYPTION=.*|MAIL_ENCRYPTION=tls|" .env || true
            grep -q "^MAIL_ENCRYPTION=" .env || echo "MAIL_ENCRYPTION=tls" >> .env
            sed -i "s|^MAIL_USERNAME=.*|MAIL_USERNAME=$MAIL_USERNAME|" .env || true
            grep -q "^MAIL_USERNAME=" .env || echo "MAIL_USERNAME=$MAIL_USERNAME" >> .env
            sed -i "s|^MAIL_PASSWORD=.*|MAIL_PASSWORD=$MAIL_PASSWORD|" .env || true
            grep -q "^MAIL_PASSWORD=" .env || echo "MAIL_PASSWORD=$MAIL_PASSWORD" >> .env
            sed -i "s|^MAIL_FROM_ADDRESS=.*|MAIL_FROM_ADDRESS=\"$MAIL_USERNAME\"|" .env || true
            grep -q "^MAIL_FROM_ADDRESS=" .env || echo "MAIL_FROM_ADDRESS=\"$MAIL_USERNAME\"" >> .env

            # Firebase (Google prijava) - sve javne, client-side vrijednosti
            # (nema service account/private key-a), pa je bezbjedno da stoje
            # ovdje umjesto kao GitHub Secrets. Upisuje se pri svakom deploy-u
            # da postojeći .env na VPS-u (koji se inače ne dira) dobije ove
            # ključeve i kad su naknadno dodani.
            echo "🔥 Upisujem Firebase konfiguraciju u .env..."
            sed -i "s|^FIREBASE_API_KEY=.*|FIREBASE_API_KEY=AIzaSyAjV1IJu9LeBV8L5WBkJOyAq665IuMvLtI|" .env || echo "FIREBASE_API_KEY=AIzaSyAjV1IJu9LeBV8L5WBkJOyAq665IuMvLtI" >> .env
            grep -q "^FIREBASE_API_KEY=" .env || echo "FIREBASE_API_KEY=AIzaSyAjV1IJu9LeBV8L5WBkJOyAq665IuMvLtI" >> .env
            sed -i "s|^FIREBASE_AUTH_DOMAIN=.*|FIREBASE_AUTH_DOMAIN=mojturnironline.firebaseapp.com|" .env || true
            grep -q "^FIREBASE_AUTH_DOMAIN=" .env || echo "FIREBASE_AUTH_DOMAIN=mojturnironline.firebaseapp.com" >> .env
            sed -i "s|^FIREBASE_PROJECT_ID=.*|FIREBASE_PROJECT_ID=mojturnironline|" .env || true
            grep -q "^FIREBASE_PROJECT_ID=" .env || echo "FIREBASE_PROJECT_ID=mojturnironline" >> .env
            sed -i "s|^FIREBASE_STORAGE_BUCKET=.*|FIREBASE_STORAGE_BUCKET=mojturnironline.firebasestorage.app|" .env || true
            grep -q "^FIREBASE_STORAGE_BUCKET=" .env || echo "FIREBASE_STORAGE_BUCKET=mojturnironline.firebasestorage.app" >> .env
            sed -i "s|^FIREBASE_MESSAGING_SENDER_ID=.*|FIREBASE_MESSAGING_SENDER_ID=183976155486|" .env || true
            grep -q "^FIREBASE_MESSAGING_SENDER_ID=" .env || echo "FIREBASE_MESSAGING_SENDER_ID=183976155486" >> .env
            sed -i "s|^FIREBASE_APP_ID=.*|FIREBASE_APP_ID=1:183976155486:web:ca8e8ec1624616cdb817cf|" .env || true
            grep -q "^FIREBASE_APP_ID=" .env || echo "FIREBASE_APP_ID=1:183976155486:web:ca8e8ec1624616cdb817cf" >> .env
            sed -i "s|^FIREBASE_MEASUREMENT_ID=.*|FIREBASE_MEASUREMENT_ID=G-SC67SYRN2X|" .env || true
            grep -q "^FIREBASE_MEASUREMENT_ID=" .env || echo "FIREBASE_MEASUREMENT_ID=G-SC67SYRN2X" >> .env

            echo "🐳 Gradim docker image..."
            docker compose build

            echo "🚀 Podižem stack (app + nginx + mysql + queue)..."
            docker compose up -d --remove-orphans

            echo "🧹 Čistim nekorišćene image-e (stari build layeri)..."
            docker image prune -f

            echo "✅ Deploy završen na MySQL bazi. Provjeri: docker compose ps"
