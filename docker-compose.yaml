version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    image: teamsphere_app:latest
    environment:
      - APP_ENV=production
      - APP_DEBUG=0
    ports:
      - "3000:80"
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: teamsphere
      MYSQL_USER: teamsphere
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  db_data:
